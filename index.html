<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Muhammad Dhaniyal</title>  
<meta name="description" content="Building websites, bots and modern digital projects">  
<link rel="icon" href="https://files.catbox.moe/oxxvdi.jpeg">  
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">  
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">  
<style>  
*{  
    margin:0;  
    padding:0;  
    box-sizing:border-box;  
    -webkit-font-smoothing:antialiased;  
    -moz-osx-font-smoothing:grayscale;  
}  
  
:root{  
    --bg:#0a0a0a;  
    --card:#111111;  
    --accent:#b80326;  
    --text:#ffffff;  
    --muted:#b8b8b8;  
}  
  
body{  
    min-height:100vh;  
    min-height:100dvh;  
    display:flex;  
    align-items:center;  
    justify-content:center;  
    padding:20px;  
    background:radial-gradient(circle at center,#1a0000 0%,#0a0a0a 100%);  
    font-family:'Inter',sans-serif;  
    color:var(--text);  
    overflow:hidden;  
    perspective:1200px;  
}  
  
.wrapper{  
    width:100%;  
    display:flex;  
    justify-content:center;  
    align-items:center;  
    transform-style:preserve-3d;  
}  
  
.card{  
    width:900px;  
    height:480px;  
    background:var(--card);  
    border-radius:24px;  
    overflow:hidden;  
    border:1px solid #1e1e1e;  
    box-shadow:  
        0 0 40px rgba(255,23,68,.25),  
        0 0 80px rgba(255,23,68,.1);  
    display:grid;  
    grid-template-columns:1fr 1fr;  
    position:relative;  
    transform-origin:center;  
    flex-shrink:0;  
    transform-style:preserve-3d;  
    backface-visibility:hidden;  
    animation:cardLand 2.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;  
    will-change:transform;  
    transform:translateZ(0);  
}  
  
.card.landed{  
    transform:none !important;  
    filter:blur(0);  
    will-change:auto;  
}  
  
.particle{  
    position:fixed;  
    width:4px;  
    height:4px;  
    background:var(--accent);  
    border-radius:50%;  
    pointer-events:none;  
    z-index:1;  
    opacity:0;  
    box-shadow:0 0 10px var(--accent);  
}  
  
@media(max-width:950px){  
    .wrapper{transform:scale(0.85) translateZ(0);}  
}  
@media(max-width:800px){  
    .wrapper{transform:scale(0.7) translateZ(0);}  
}  
@media(max-width:650px){  
    .wrapper{transform:scale(0.55) translateZ(0);}  
}  
@media(max-width:500px){  
    body{padding:10px;}  
    .wrapper{transform:scale(0.42) translateZ(0);}  
}  
@media(max-width:400px){  
    .wrapper{transform:scale(0.34) translateZ(0);}  
}  
@media(max-width:320px){  
    .wrapper{transform:scale(0.29) translateZ(0);}  
}  
  
.divider{  
    position:absolute;  
    left:50%;  
    top:50%;  
    transform:translate(-50%,-50%);  
    width:2px;  
    height:70%;  
    background:linear-gradient(  
        180deg,  
        transparent 0%,  
        var(--accent) 50%,  
        transparent 100%  
    );  
    z-index:2;  
}  
  
.notch{  
    position:absolute;  
    left:50%;  
    top:50%;  
    transform:translate(-50%,-50%);  
    width:12px;  
    height:60px;  
    background:var(--accent);  
    border-radius:6px;  
    box-shadow:0 0 15px rgb(131,0,25);  
    z-index:3;  
}  
  
.left{  
    padding:50px 45px;  
    display:flex;  
    flex-direction:column;  
    justify-content:center;  
    gap:18px;  
    background:linear-gradient(  
        135deg,  
        #111111 0%,  
        #0d0d0d 100%  
    );  
}  
  
.right{  
    padding:50px 45px;  
    display:flex;  
    flex-direction:column;  
    justify-content:center;  
    align-items:center;  
    gap:30px;  
    background:  
    radial-gradient(circle at center,#1a0a0a 0%,#111111 70%);  
    position:relative;  
}  
  
.right::before{  
    content:"";  
    position:absolute;  
    inset:0;  
    background-image:  
    radial-gradient(circle,  
    rgba(174,6,38,0.694) 1px,  
    transparent 1px);  
    background-size:12px 12px;  
    pointer-events:none;  
}  
  
.name{  
    font-family:'Orbitron',sans-serif;  
    font-size:44px;  
    font-weight:700;  
    line-height:1.05;  
    margin-bottom:6px;  
}  
  
.title{  
    font-family:'Orbitron',sans-serif;  
    color:var(--accent);  
    font-size:19px;  
    margin-bottom:12px;  
}  
  
.bio{  
    color:var(--muted);  
    line-height:1.5;  
    font-size:16px;  
    margin-bottom:14px;  
}  
  
.line{  
    width:100%;  
    height:1px;  
    background:var(--accent);  
    opacity:.4;  
    margin-bottom:14px;  
}  
  
.contacts{  
    list-style:none;  
    display:flex;  
    flex-direction:column;  
    gap:18px;  
}  
  
.contacts a,  
.contacts .static{  
    text-decoration:none;  
    color:white;  
    display:flex;  
    align-items:center;  
    gap:14px;  
    transition:.25s;  
    font-size:16px;  
}  
  
.contacts a:hover{  
    color:var(--accent);  
    transform:translateX(4px);  
}  
  
.icon{  
    width:22px;  
    height:22px;  
    color:var(--accent);  
    flex-shrink:0;  
}  
  
.avatar-wrap{  
    width:220px;  
    height:220px;  
    border-radius:50%;  
    padding:6px;  
    background:linear-gradient(  
        135deg,  
        #ff1744 0%,  
        #d50000 100%  
    );  
    box-shadow:  
    0 0 30px rgba(255,23,68,.5),  
    inset 0 0 20px rgba(255,23,68,.2);  
    animation:pulse 2s infinite;  
    position:relative;  
    z-index:2;  
}  
  
.avatar{  
    width:100%;  
    height:100%;  
    border-radius:50%;  
    object-fit:cover;  
    border:4px solid #111111;  
    background:white;  
    display:block;  
}  
  
.badge{  
    display:inline-flex;  
    align-items:center;  
    gap:8px;  
    padding:12px 28px;  
    background:var(--accent);  
    color:white;  
    border-radius:50px;  
    font-family:'Orbitron',sans-serif;  
    font-size:13px;  
    font-weight:600;  
    letter-spacing:1px;  
    text-transform:uppercase;  
    box-shadow:0 4px 20px rgba(255,23,68,.4);  
    transition:.3s;  
    position:relative;  
    z-index:2;  
    white-space:nowrap;  
}  
  
.badge:hover{  
    transform:translateY(-2px);  
    box-shadow:0 6px 25px rgba(255,23,68,.6);  
}  
  
.copy-msg{  
    position:fixed;  
    bottom:20px;  
    left:50%;  
    transform:translateX(-50%);  
    background:var(--accent);  
    color:white;  
    padding:12px 18px;  
    border-radius:50px;  
    font-size:14px;  
    opacity:0;  
    pointer-events:none;  
    transition:.3s;  
    z-index:100;  
}  
  
.copy-msg.show{  
    opacity:1;  
}  
  
@keyframes pulse{  
    0%,100%{  
        box-shadow:  
        0 0 30px rgba(255,23,68,.5),  
        inset 0 0 20px rgba(255,23,68,.2);  
    }  
    50%{  
        box-shadow:  
        0 0 50px rgba(255,23,68,.8),  
        inset 0 0 30px rgba(255,23,68,.3);  
    }  
}  
  
@keyframes cardLand{  
    0%{  
        opacity:0;  
        transform:translateY(-100vh) rotateX(90deg) rotateZ(-180deg) scale(0.5) translateZ(0);  
    }  
    40%{  
        opacity:1;  
        transform:translateY(-20vh) rotateX(20deg) rotateZ(-45deg) scale(0.8) translateZ(0);  
    }  
    70%{  
        transform:translateY(0) rotateX(-5deg) rotateZ(10deg) scale(1.05) translateZ(0);  
    }  
    85%{  
        transform:translateY(-10px) rotateX(2deg) rotateZ(-2deg) scale(0.98) translateZ(0);  
    }  
    100%{  
        opacity:1;  
        transform:translateY(0) rotateX(0) rotateZ(0) scale(1) translateZ(0);  
    }  
}  
</style>  
</head>  
<body>  
<div class="wrapper">  
    <div class="card" id="card">  
    <div class="divider"></div>  
    <div class="notch"></div>  
  
    <section class="left">  
  
        <div>  
            <h1 class="name">Muhammad<br>Dhaniyal</h1>  
            <h2 class="title">Developer</h2>  
            <p class="bio">  
                Building websites, bots and modern digital projects.  
            </p>  
        </div>  
  
        <div class="line"></div>  
  
        <ul class="contacts">  
  
            <li>  
                <a href="#" id="emailLink" aria-label="Email Muhammad Dhaniyal">  
                    <svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">  
                        <path d="M4 4h16v16H4z"/>  
                        <path d="M22 6l-10 7L2 6"/>  
                    </svg>  
                    dhaniyal.dev@gmail.com  
                </a>  
            </li>  
  
            <li>  
                <a href="https://darkking.qzz.io" target="_blank" aria-label="Website">  
                    <svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">  
                        <circle cx="12" cy="12" r="10"/>  
                        <path d="M2 12h20"/>  
                        <path d="M12 2a15 15 0 0 1 0 20"/>  
                        <path d="M12 2a15 15 0 0 20"/>  
                    </svg>  
                    dhaniyal.dev  
                </a>  
            </li>  
  
            <li>  
                <a href="https://github.com/D4RK-KlNG" target="_blank" aria-label="GitHub">  
                    <svg class="icon" fill="currentColor" viewBox="0 0 24 24">  
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>

                    github.com/D4RK-KlNG

            <li class="static">  
                <svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">  
                    <path d="M12 22s8-4.5 8-12a8 8 0 10-16 0c0 7.5 8 12 8 12z"/>  
                    <circle cx="12" cy="10" r="3"/>  
                </svg>  
                kerala, India  
            </li>  
  
        </ul>  
  
    </section>  
  
    <section class="right">  
  
        <div class="avatar-wrap">  
            <img  
                class="avatar"  
                src="https://files.catbox.moe/oxxvdi.jpeg"  
                alt="Muhammad Dhaniyal pixel avatar"
                onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=Muhammad+Dhaniyal&background=b80326&color=fff&size=512&bold=true&font-size=0.3';">  
        </div>  
  
        <div class="badge">  
            &lt;/&gt;  
            CODE. CREATE. ELEVATE.  
        </div>  
  
    </section>
  
    </div>  
</div>  
  
<div class="copy-msg" id="toast">  
Email copied!  
</div>  
  
<script>  
const emailLink = document.getElementById('emailLink');  
const toast = document.getElementById('toast');  
const card = document.getElementById('card');  
  
emailLink.addEventListener('click', async (e)=>{  
    e.preventDefault();  
    try{  
        await navigator.clipboard.writeText('dhaniyal.dev@gmail.com');  
        toast.classList.add('show');  
        setTimeout(()=>{  
            toast.classList.remove('show');  
        },2000);  
    }  
    catch{  
        window.location.href = 'mailto:dhaniyal.dev@gmail.com';  
    }  
});

// Fix blur after animation
card.addEventListener('animationend', () => {
    card.classList.add('landed');
});

// Particle tail effect during intro
function createParticle(x, y) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = x + 'px';
    particle.style.top = y + 'px';
    document.body.appendChild(particle);
    
    particle.animate([
        { opacity: 1, transform: 'scale(1)' },
        { opacity: 0, transform: 'scale(0)' }
    ], {
        duration: 800,
        easing: 'ease-out'
    });
    
    setTimeout(() => particle.remove(), 800);
}

let particleInterval = setInterval(() => {
    const rect = card.getBoundingClientRect();
    const x = rect.left + rect.width / 2 + (Math.random() - 0.5) * 100;
    const y = rect.top + rect.height / 2 + (Math.random() - 0.5) * 100;
    createParticle(x, y);
}, 30);

setTimeout(() => clearInterval(particleInterval), 2000);
</script>  
</body>  
  </html>
